# Gbox Virtual Environment — local stack
#
# Usage:
#   docker compose up --build
#   # app on http://localhost:8000 , Postgres on localhost:5432
#
# The app uses GBOX_DATABASE_URL for PostgreSQL; if unset it falls back to
# sqlite (file) so it also runs standalone.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gbox
      POSTGRES_PASSWORD: gbox
      POSTGRES_DB: gbox
    ports:
      - "5432:5432"
    volumes:
      - gbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      GBOX_DATABASE_URL: postgresql+asyncpg://gbox:gbox@db:5432/gbox
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  gbox_pgdata:
